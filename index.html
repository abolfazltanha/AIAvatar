<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VCA Avatar Demo</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #container {
      width: 100vw;
      height: 100vh;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* optional loading overlay */
    #loading {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      z-index: 10;
    }
  </style>
</head>

<body>

<div id="loading">Loading avatar...</div>

<div id="container">
  <iframe 
    id="avatarFrame"
    src="https://embed.liveavatar.com/v1/b13d30bd-71f9-4a24-9a9b-6ecf9cd37a46"
    allow="microphone *; camera *; autoplay"
    title="LiveAvatar Embed">
  </iframe>
</div>

<script>
  const iframe = document.getElementById('avatarFrame');
  const loading = document.getElementById('loading');

  iframe.onload = () => {
    loading.style.display = 'none';
  };
</script>

</body>
</html>
