<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VCA Avatar (Anam)</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    anam-agent {
      width: 100%;
      height: 100%;
    }

    #loading {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      z-index: 10;
    }
  </style>
</head>

<body>

<div id="loading">Loading avatar...</div>

<div id="container">
  <anam-agent agent-id="92a19ccb-194c-40c1-9994-101bad089cbc"></anam-agent>
</div>

<script src="https://unpkg.com/@anam-ai/agent-widget" async></script>

<script>
  // loading hide (approx)
  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
  }, 2000);
</script>

</body>
</html>
