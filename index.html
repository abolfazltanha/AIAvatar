<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LiveAvatar Test</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #container {
      width: 100vw;
      height: 100vh;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #loading {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      font-family: Arial;
    }
  </style>
</head>

<body>

<div id="loading">Loading LiveAvatar...</div>

<div id="container">
  <iframe
    id="avatarFrame"
    src="https://embed.liveavatar.com/v1/0c991148-17cf-4318-a4b6-7cc9e4126842"
    allow="microphone *; camera *; autoplay"
    title="LiveAvatar Embed">
  </iframe>
</div>

<script>
  const iframe = document.getElementById('avatarFrame');
  const loading = document.getElementById('loading');

  iframe.onload = () => {
    loading.style.display = 'none';
  };
</script>

</body>
</html>
